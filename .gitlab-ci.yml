stages:
  - lint
  - test
  - typecheck
  - security
  - automation

variables:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.3"
  POETRY_VIRTUALENVS_IN_PROJECT: "true"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip
    - .venv

# -------------------
# BASE SETUP
# -------------------
.default_python:
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install poetry==${POETRY_VERSION}
    - poetry config virtualenvs.in-project true
    - poetry install --no-interaction --no-ansi --with dev

# =====================================================
# NORMAL CI (NIE DZIAŁA NA SCHEDULE)
# =====================================================

lint:
  extends: .default_python
  stage: lint
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  script:
    - poetry run ruff check .
    - poetry run black --check .

test:
  extends: .default_python
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  script:
    - poetry run pytest -q --maxfail=1 --junitxml=report.xml --cov=. --cov-report=xml
  artifacts:
    when: always
    reports:
      junit: report.xml

mypy:
  extends: .default_python
  stage: typecheck
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  allow_failure: true
  script:
    - poetry run mypy .

bandit:
  extends: .default_python
  stage: security
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  allow_failure: true
  script:
    - poetry run bandit -r .

# =====================================================
# AUTOMATION (ONLY SCHEDULE)
# =====================================================

.daily_base:
  stage: automation
  image: python:${PYTHON_VERSION}-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  before_script:
    - apt-get update && apt-get install -y git
    - git config --global user.name "CI Bot"
    - git config --global user.email "ci-bot@example.com"

# -------------------
# DAILY UPDATE
# -------------------
daily_update:
  extends: .daily_base
  script:
    - |
      if [ $((RANDOM % 5)) -ne 0 ]; then
        echo "Skip update"
        exit 0
      fi

      echo "Last update: $(date)" > LAST_RUN.md
      git add LAST_RUN.md
      git commit -m "chore: daily update [skip ci]" || echo "No changes"

      git push https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git HEAD:$CI_DEFAULT_BRANCH

# -------------------
# DAILY TAG
# -------------------
daily_tag:
  extends: .daily_base
  script:
    - |
      VERSION=$(date +%Y.%m.%d)

      git tag "v$VERSION" || echo "Tag exists"
      git push https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git --tags

# -------------------
# SMART ACTIVITY
# -------------------
smart_activity:
  extends: .daily_base
  script:
    - |
      DAY=$(date +%u)

      if [ "$DAY" -ge 6 ]; then
        echo "Weekend - low activity"
      fi

      if [ $((RANDOM % 10)) -lt 7 ]; then
        echo "No activity today"
        exit 0
      fi

      mkdir -p logs
      echo "run: $(date)" >> logs/activity.log

      if [ ! -f VERSION ]; then
        echo "0.1.0" > VERSION
      fi

      VERSION=$(cat VERSION)
      IFS='.' read MAJOR MINOR PATCH <<< "$VERSION"
      PATCH=$((PATCH + 1))
      NEW_VERSION="$MAJOR.$MINOR.$PATCH"
      echo $NEW_VERSION > VERSION

      git add logs VERSION
      git commit -m "chore: smart update" || echo "No changes"
      git push https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git HEAD:$CI_DEFAULT_BRANCH
