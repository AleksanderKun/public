name: Daily Activity

on:
  schedule:
    # Co poniedziałek o 9:00 UTC (dostosuj czas)
    - cron: '0 9 * * 1'
  workflow_dispatch: # Ręczne uruchomienie

jobs:
  update-activity:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update activity file
      run: |
        # Dodaj wpis do pliku aktywności
        echo "$(date '+%Y-%m-%d %H:%M:%S') - Automated activity update" >> activity_log.md

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add activity_log.md
        git commit -m "Automated activity update - $(date '+%Y-%m-%d')" || echo "No changes to commit"
        git push