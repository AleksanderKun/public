name: Realistic Activity

on:
  schedule:
    # Codziennie o losowej porze (9:00 UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  maybe-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Prepare activity files
      run: |
        mkdir -p scripts dbt/models/staging
        touch README.md activity_log.md scripts/placeholder.py dbt/models/staging/stg_example.sql

    - name: Determine activity level
      id: activity
      run: |
        # Sprawdź dzień tygodnia (0=niedziela, 6=sobota)
        DAY=$(date +%w)
        if [ "$DAY" -eq 0 ] || [ "$DAY" -eq 6 ]; then
          # Weekend: 80% szans, 5-10 commitów
          PROB=8
          MAX_COMMITS=10
          MIN_COMMITS=5
        else
          # Tydzień: 60% szans, 2-3 commity
          PROB=6
          MAX_COMMITS=3
          MIN_COMMITS=2
        fi

        # Czy uruchomić?
        if [ $((RANDOM % 10)) -lt $PROB ]; then
          NUM_COMMITS=$((RANDOM % (MAX_COMMITS - MIN_COMMITS + 1) + MIN_COMMITS))
          echo "should_update=true" >> $GITHUB_OUTPUT
          echo "num_commits=$NUM_COMMITS" >> $GITHUB_OUTPUT
        else
          echo "should_update=false" >> $GITHUB_OUTPUT
        fi

    - name: Generate multiple commits (if triggered)
      if: steps.activity.outputs.should_update == 'true'
      run: |
        NUM_COMMITS=${{ steps.activity.outputs.num_commits }}
        for i in $(seq 1 $NUM_COMMITS); do
          # Losowy typ aktywności
          ACTIVITY_TYPE=$((RANDOM % 4))
          case $ACTIVITY_TYPE in
            0)
              # Update README
              echo "- $(date '+%Y-%m-%d %H:%M:%S') - Routine documentation update $i" >> README.md
              ;;
            1)
              # Update activity log
              echo "$(date '+%Y-%m-%d %H:%M:%S') - Code review notes $i" >> activity_log.md
              ;;
            2)
              # Small script update
              echo "# $(date '+%Y-%m-%d %H:%M:%S') - Minor optimization $i" >> scripts/placeholder.py
              ;;
            3)
              # Update dbt model comment
              echo "-- $(date '+%Y-%m-%d %H:%M:%S') - Added clarifying comment $i" >> dbt/models/staging/stg_example.sql
              ;;
          esac

          # Commit po każdej zmianie
          git config --local user.email "activity@github.com"
          git config --local user.name "Automated Activity"
          git add .
          MESSAGES=("Minor updates" "Code cleanup" "Documentation improvements" "Bug fixes" "Feature enhancements" "Refactoring" "Testing updates" "Performance optimization" "Code review changes" "Dependency updates" "Logging improvements" "Error handling" "UI tweaks" "Database optimizations" "Security patches")
          RANDOM_MESSAGE=${MESSAGES[$((RANDOM % ${#MESSAGES[@]}))]}
          git commit -m "$RANDOM_MESSAGE $i - $(date '+%Y-%m-%d %H:%M:%S')" --allow-empty
        done

    - name: Push all commits
      if: steps.activity.outputs.should_update == 'true'
      run: |
        git push
