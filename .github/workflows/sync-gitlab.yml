name: Sync to GitLab

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add GitLab remote
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_PROJECT_PATH: ${{ secrets.GITLAB_PROJECT_PATH }}
        run: |
          if [ -z "${GITLAB_TOKEN}" ] || [ -z "${GITLAB_PROJECT_PATH}" ]; then
            echo "Missing required secrets: GITLAB_TOKEN or GITLAB_PROJECT_PATH"
            exit 1
          fi
          git remote add gitlab "https://${GITLAB_TOKEN}@gitlab.com/${GITLAB_PROJECT_PATH}.git"

      - name: Push mirror to GitLab
        run: |
          git push --mirror gitlab
